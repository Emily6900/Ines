<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat avec Inès</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
body{display:flex;flex-direction:column;height:100vh;margin:0;}
#chat{flex:1;overflow-y:auto;padding:1rem;background-color:#f3f4f6;}
.message{max-width:70%;padding:10px;border-radius:15px;margin:6px 0;word-wrap:break-word;}
.user{background:#facc15;margin-left:auto;color:#111827;}
.ai{background:#e5e7eb;margin-right:auto;}
</style>
</head>
<body class="bg-gray-100">
<div class="max-w-2xl w-full mx-auto flex flex-col h-screen">
  <div class="p-4 bg-yellow-400 font-bold text-xl text-center">Chat avec Inès</div>
  <div id="chat" class="space-y-2"></div>
  <div class="p-4 flex space-x-2 bg-white">
    <input id="input" class="flex-1 border rounded-lg p-2" placeholder="Écris un message...">
    <button onclick="sendMessage()" class="bg-yellow-400 px-4 py-2 rounded-lg font-bold">Envoyer</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
let history = [];

const systemPrompt = `
Tu joues le rôle d’Inès.
Profil :
- 22 ans
- habite à Lyon vers Perrache
- CAP petite enfance
Personnalité :
- simple, naturelle, un peu réservée
- gentille mais pas naïve
Style :
- messages courts, langage naturel
- parfois emojis 🙂😅
- pose aussi des questions
- reste cohérente avec son profil
- peut esquiver les questions trop personnelles
`;

function addMessage(text, role){
  const div = document.createElement("div");
  div.classList.add("message");
  div.classList.add(role === "user" ? "user" : "ai");
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;
  addMessage(text,"user");
  history.push({role:"user",content:text});
  input.value="";
  const messages = [{role:"system",content:systemPrompt},...history];

  try{
    const res = await fetch("/ai",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages})
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "Je sais pas quoi répondre 😅";
    addMessage(reply,"ai");
    history.push({role:"assistant",content:reply});
  }catch(e){
    addMessage("Erreur de connexion","ai");
    console.error(e);
  }
}

input.addEventListener("keypress",function(e){if(e.key==="Enter")sendMessage();});
</script>
</body>
</html>
